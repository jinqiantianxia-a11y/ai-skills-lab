
<script>
(function() {
  var STORAGE_KEY = 'chirpy-sidebar-scroll';

  function initSidebarScroll() {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    const saved = sessionStorage.getItem(STORAGE_KEY);
    if (saved) sidebar.scrollTop = parseInt(saved, 10);

    const save = () => sessionStorage.setItem(STORAGE_KEY, sidebar.scrollTop);
    sidebar.addEventListener('scroll', save, { passive: true });
  }

  function initCollapse() {
    document.querySelectorAll('.custom-collapse').forEach(item => {
      const header = item.querySelector('.collapse-header');
      if (!header) return;

      header.addEventListener('click', () => {
        item.classList.toggle('open');
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    initSidebarScroll();
    initCollapse();
  });
  document.addEventListener('pjax:complete', function() {
    initSidebarScroll();
    initCollapse();
  });
})();
</script>
