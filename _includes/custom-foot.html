<script>
  (function() {
    var STORAGE_KEY = 'chirpy-sidebar-scroll';
    var sidebar = null;
    var debugEnabled = true;

    function log() {
      if (!debugEnabled) return;
      console.log('[SidebarScroll]', ...arguments);
    }

    // 获取侧边栏元素（支持动态重试）
    function getSidebar() {
      if (sidebar && sidebar.isConnected) return sidebar;
      sidebar = document.querySelector('#sidebar');
      return sidebar;
    }

    // 恢复滚动位置
    function restoreScroll() {
      var sidebarEl = getSidebar();
      if (!sidebarEl) {
        log('❌ restoreScroll: 找不到 #sidebar 元素');
        return;
      }
      var saved = sessionStorage.getItem(STORAGE_KEY);
      log('📥 restoreScroll: 读取 sessionStorage →', saved);
      if (saved !== null) {
        var pos = parseInt(saved, 10);
        if (!isNaN(pos)) {
          sidebarEl.scrollTop = pos;
          log('✅ 已恢复侧边栏滚动位置到', pos);
        } else {
          log('⚠️ 保存的值不是数字:', saved);
        }
      } else {
        log('ℹ️ 没有保存的滚动位置');
      }
    }

    // 保存当前滚动位置
    function saveScroll(reason) {
      var sidebarEl = getSidebar();
      if (!sidebarEl) {
        log('❌ saveScroll(%s): 找不到 #sidebar', reason);
        return;
      }
      var currentPos = sidebarEl.scrollTop;
      sessionStorage.setItem(STORAGE_KEY, currentPos);
      log('💾 saveScroll(%s): 保存位置 %d', reason, currentPos);
    }

    // 监听侧边栏内的链接点击，在跳转前保存
    function captureLinkClicks() {
      var sidebarEl = getSidebar();
      if (!sidebarEl) {
        log('❌ captureLinkClicks: 找不到侧边栏');
        return;
      }
      var links = sidebarEl.querySelectorAll('a');
      log('🔗 找到侧边栏内链接数量:', links.length);
      links.forEach(function(link) {
        link.addEventListener('click', function(e) {
          // 只处理内部导航（同源且不是锚点）
          var href = link.getAttribute('href');
          if (href && !href.startsWith('#') && !href.startsWith('javascript:')) {
            log('🖱️ 点击链接:', href);
            saveScroll('link-click');
          }
        });
      });
    }

    // 监听页面可见性变化（用户切换标签页时保存）
    function bindVisibilityChange() {
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          log('👁️ 页面隐藏，保存滚动位置');
          saveScroll('visibilitychange');
        }
      });
    }

    // 监听 beforeunload（传统页面刷新/关闭）
    function bindBeforeUnload() {
      window.addEventListener('beforeunload', function() {
        log('🚪 beforeunload 触发');
        saveScroll('beforeunload');
      });
    }

    // 监听 pageshow（可能是 bfcache 恢复）
    function bindPageShow() {
      window.addEventListener('pageshow', function(event) {
        log('📄 pageshow 触发, persisted =', event.persisted);
        restoreScroll();
      });
    }

    // 使用 MutationObserver 监控侧边栏是否被动态替换
    function watchSidebarChanges() {
      var targetNode = document.body;
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.type === 'childList' || mutation.type === 'subtree') {
            var newSidebar = getSidebar();
            if (newSidebar && !sidebar) {
              log('🔍 检测到侧边栏被添加到 DOM');
              sidebar = newSidebar;
              captureLinkClicks();
            }
          }
        });
      });
      observer.observe(targetNode, { childList: true, subtree: true });
      log('👀 已启动 MutationObserver 监听 DOM 变化');
    }

    // 初始化
    function init() {
      log('🚀 脚本初始化开始');
      var sidebarEl = getSidebar();
      if (sidebarEl) {
        log('✅ 侧边栏已存在');
        captureLinkClicks();
      } else {
        log('⚠️ 侧边栏尚未加载，启动 MutationObserver 等待');
        watchSidebarChanges();
      }
      restoreScroll();        // 尝试恢复（可能侧边栏还未加载，但没关系）
      bindVisibilityChange();
      bindBeforeUnload();
      bindPageShow();
      log('🚀 脚本初始化完成');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
